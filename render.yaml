services:
  - type: web
    name: stage-ai-radar-web
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: STAGE_AI_RADAR_STORAGE
        value: postgres
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: DATABASE_ENABLE_CHANNEL_BINDING
        value: "true"
      - key: DATABASE_URL
        sync: false
